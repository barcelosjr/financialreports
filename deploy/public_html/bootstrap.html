<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap — primeiro super_admin</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.15rem; }
  section { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; }
  label { display: block; font-size: 0.85rem; color: #555; margin: 0.75rem 0 0.25rem; }
  input { padding: 0.5rem; width: 100%; box-sizing: border-box; }
  button { margin-top: 1rem; padding: 0.6rem 1.2rem; cursor: pointer; }
  pre { background: #f5f5f5; padding: 0.75rem; border-radius: 6px; white-space: pre-wrap; word-break: break-word; margin-top: 1rem; }
  .aviso { background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; padding: 0.75rem; font-size: 0.85rem; margin-bottom: 1rem; }
</style>
</head>
<body>
  <h1>Criar o primeiro super_admin</h1>
  <div class="aviso">
    Só funciona <strong>uma vez</strong> — enquanto não existir nenhum usuário no banco.
    Depois de usar, apague este arquivo (<code>bootstrap.html</code>) do servidor;
    ele não faz mal ficar, mas também não serve pra nada depois da primeira vez.
  </div>
  <section>
    <label for="nome">Nome</label>
    <input id="nome" placeholder="Seu nome">
    <label for="email">E-mail</label>
    <input id="email" type="email" placeholder="voce@empresa.com.br">
    <label for="senha">Senha</label>
    <input id="senha" type="password" placeholder="mínimo 6 caracteres">
    <button id="btnCriar">Criar super_admin</button>
    <pre id="out"></pre>
  </section>

  <script>
    document.getElementById('btnCriar').addEventListener('click', async () => {
      const out = document.getElementById('out');
      out.textContent = 'Enviando...';
      try {
        const res = await fetch('/api/auth/bootstrap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value,
          }),
        });
        const texto = await res.text();
        out.textContent = 'HTTP ' + res.status + '\n' + texto;
        if (res.ok) {
          out.textContent += '\n\nPronto! Pode fechar esta página e entrar pelo site normal (/login) com esse e-mail/senha.';
        }
      } catch (e) {
        out.textContent = 'Erro de rede: ' + e.message;
      }
    });
  </script>
</body>
</html>
